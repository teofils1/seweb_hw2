<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Book Not Found</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light text-dark">
    <div class="container mt-5">
        <div class="card shadow-sm mx-auto border-0 text-center" style="max-width: 500px;">
            <div class="card-body py-5">
                <h1 class="display-1 text-secondary mb-3">📚</h1>
                <h2 class="h4 mb-3">Book Not Found</h2>
                <p class="text-secondary mb-4">
                    The book "<strong th:text="${errorTitle}">Unknown</strong>" could not be located in our RDF model.
                    It may have been removed, or the title might not be perfectly exact.
                </p>
                <a class="btn btn-primary px-4" th:href="@{/books}">Back to Book List</a>
            </div>
        </div>
    </div>

    <!-- RAG Chat Widget -->
    <div th:insert="~{fragments/chat-widget :: widget}"></div>
</body>
</html>
