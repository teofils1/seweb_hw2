<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Book Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light text-dark">
    <div class="container mt-5">
        <div class="card shadow-sm mx-auto border-0" style="max-width: 600px;">
            <div class="card-header bg-white border-bottom">
                <h2 class="h4 mb-0 py-2">Book Details</h2>
            </div>
            <div class="card-body">
                <table class="table table-borderless mb-0">
                    <tbody>
                        <tr>
                            <th class="w-25 text-end text-secondary">Title:</th>
                            <td class="fw-medium" th:text="${book.title}"></td>
                        </tr>
                        <tr>
                            <th class="w-25 text-end text-secondary">Author:</th>
                            <td th:text="${book.author != null ? book.author : 'Unknown'}"></td>
                        </tr>
                        <tr>
                            <th class="w-25 text-end text-secondary">Themes:</th>
                            <td th:text="${book.themes}"></td>
                        </tr>
                        <tr>
                            <th class="w-25 text-end text-secondary">Reading Level:</th>
                            <td th:text="${book.readingLevel}"></td>
                        </tr>
                        <tr>
                            <th class="w-25 text-end text-secondary">RDF Resource URI:</th>
                            <td class="font-monospace text-muted" th:text="${book.uri}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="card-footer bg-light py-3 border-top text-end">
                <a class="btn btn-outline-secondary px-4 me-2" th:href="@{/books}">Back</a>
                <a class="btn btn-primary px-4" th:href="@{/books/{title}/edit(title=${book.title})}">Edit</a> 
            </div>
        </div>
    </div>

    <!-- RAG Chat Widget -->
    <div th:insert="~{fragments/chat-widget :: widget}"></div>
</body>
</html>
