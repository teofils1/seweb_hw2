<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Book</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light text-dark">
    <div class="container mt-5">
        <div class="card shadow-sm mx-auto border-0" style="max-width: 600px;">
            <div class="card-header bg-white border-bottom">
                <h2 class="h4 mb-0 py-2" th:text="'Edit Book: ' + ${book.title}">Edit Book</h2>
            </div>
            
            <form th:action="@{/books/{title}/edit(title=${book.title})}" method="post" class="card-body">
                <div class="mb-3">
                    <label class="form-label text-secondary">Author</label>
                    <input type="text" class="form-control" name="author" th:value="${book.author}" />
                </div>
                
                <div class="mb-3">
                    <label class="form-label text-secondary">Themes <small class="text-muted">(Hold CTRL/Command to select multiple)</small></label>
                    <select class="form-select" name="themes" multiple size="4">
                        <option value="Science Fiction" th:selected="${book.themes != null and #strings.contains(book.themes, 'Science Fiction')}">Science Fiction</option>
                        <option value="Fantasy" th:selected="${book.themes != null and #strings.contains(book.themes, 'Fantasy')}">Fantasy</option>
                        <option value="Mystery" th:selected="${book.themes != null and #strings.contains(book.themes, 'Mystery')}">Mystery</option>
                        <option value="Murder" th:selected="${book.themes != null and #strings.contains(book.themes, 'Murder')}">Murder</option>
                        <option value="Romance" th:selected="${book.themes != null and #strings.contains(book.themes, 'Romance')}">Romance</option>
                        <option value="Action" th:selected="${book.themes != null and #strings.contains(book.themes, 'Action')}">Action</option>
                    </select>
                </div>
                
                <div class="mb-4">
                    <label class="form-label text-secondary">Reading Level</label>
                    <select class="form-select" name="readingLevel">
                        <option value="">-- Select Reading Level --</option>
                        <option value="Beginner" th:selected="${book.readingLevel == 'Beginner'}">Beginner</option>
                        <option value="Intermediate" th:selected="${book.readingLevel == 'Intermediate'}">Intermediate</option>
                        <option value="Advanced" th:selected="${book.readingLevel == 'Advanced'}">Advanced</option>
                    </select>
                </div>
                
                <div class="d-flex justify-content-end">
                    <a class="btn btn-outline-secondary px-4 me-2" th:href="@{/books/{title}(title=${book.title})}">Cancel</a>
                    <button type="submit" class="btn btn-primary px-4">Update</button>
                </div>
            </form>
        </div>
    </div>

    <!-- RAG Chat Widget -->
    <div th:insert="~{fragments/chat-widget :: widget}"></div>
</body>
</html>
