<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>RDF Knowledge Graph Optimization</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- VIS.JS Library dependencies for interactive network charts -->
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        #mynetwork {
            width: 100%;
            height: 700px;
            border: 1px solid lightgray;
            background-color: #ffffff;
            border-radius: 8px;
        }
    </style>
</head>
<body class="bg-light text-dark">
    <div class="container mt-4 mb-5">
        <h2 class="mb-3">Ontology Graph Mapping</h2>
        <div class="d-flex justify-content-between mb-3">
            <p class="text-secondary mb-0 mt-2">Interactive topology generated via `<span class="badge bg-light text-dark font-monospace text-wrap">/api/rdf/graph</span>`</p>
            <a class="btn btn-outline-primary" th:href="@{/}">Back Home</a>
        </div>
        
        <div class="shadow-sm">
            <div id="mynetwork"></div>
        </div>
    </div>

    <!-- Script to execute vis graph from backend JSON schema -->
    <script type="text/javascript">
        fetch('/api/rdf/graph')
            .then(response => response.json())
            .then(data => {
                var container = document.getElementById('mynetwork');
                
                var options = {
                    nodes: {
                        shape: 'dot',
                        size: 20,
                        font: { size: 14, color: '#333' },
                        color: {
                            background: '#0d6efd',
                            border: '#084298',
                            highlight: {
                                background: '#198754',
                                border: '#0f5132'
                            }
                        }
                    },
                    edges: {
                        font: { size: 12, align: 'top' },
                        color: { color: '#6c757d', highlight: '#0dcaf0' },
                        arrows: {
                            to: { enabled: true, scaleFactor: 0.6 }
                        },
                        smooth: { enabled: true, type: 'continuous' }
                    },
                    physics: {
                        enabled: true,
                        barnesHut: {
                            gravitationalConstant: -2000,
                            centralGravity: 0.3,
                            springLength: 150,
                            springConstant: 0.04
                        }
                    }
                };

                // Initialize network 
                new vis.Network(container, data, options);
            })
            .catch(error => console.error("Error fetching graph data:", error));
    </script>

    <!-- RAG Chat Widget -->
    <div th:insert="~{fragments/chat-widget :: widget}"></div>
</body>
</html>
