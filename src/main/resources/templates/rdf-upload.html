<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Upload RDF</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light text-dark">
    <div class="container mt-5">
        <div class="card shadow-sm mx-auto border-0" style="max-width: 600px;">
            <div class="card-header bg-white border-bottom">
                <h2 class="h4 mb-0 py-2">Upload Custom RDF File</h2>
            </div>
            
            <form th:action="@{/rdf/upload}" method="post" enctype="multipart/form-data" class="card-body">
                <div class="mb-4">
                    <label class="form-label text-secondary">Select File (.rdf, .xml, .owl)</label>
                    <input class="form-control" type="file" name="file" accept=".rdf, .xml, .owl" required />
                    <div class="form-text mt-2">
                        Uploading an RDF file will instantly append its triples directly into the active Apache Jena graph.
                    </div>
                </div>
                
                <div class="d-flex justify-content-end">
                    <a class="btn btn-outline-secondary px-4 me-2" th:href="@{/}">Cancel</a>
                    <button type="submit" class="btn btn-primary px-4">Upload and Merge</button>
                </div>
            </form>
        </div>
    </div>

    <!-- RAG Chat Widget -->
    <div th:insert="~{fragments/chat-widget :: widget}"></div>
</body>
</html>
