<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Books List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light text-dark">
    <div class="container mt-5">
        <h1 class="mb-4" th:if="${username != null}" th:text="'Recommendations for ' + ${username}">Recommendations</h1>
        <h1 class="mb-4" th:unless="${username != null}">All Books</h1>

        <div class="bg-white border rounded shadow-sm">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Title</th>
                        <th>Author</th>
                        <th>Theme(s)</th>
                        <th>Reading Level</th>
                    </tr>
                </thead>
                <tbody class="align-middle">
                    <tr th:each="book : ${books}">
                        <td>
                            <a class="text-decoration-none" th:href="@{/books/{title}(title=${book.title})}" th:text="${book.title}">Title</a>
                        </td>
                        <td th:text="${book.author != null ? book.author : 'Unknown'}">Author</td>
                        <td th:text="${book.themes}">Themes</td>
                        <td th:text="${book.readingLevel}">Level</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="mt-4">
            <a class="btn btn-primary px-4" th:href="@{/books/add}">Add Book</a>
            <a class="btn btn-outline-secondary px-4 ms-2" th:href="@{/}">Home</a>
        </div>
    </div>

    <!-- RAG Chat Widget -->
    <div th:insert="~{fragments/chat-widget :: widget}"></div>
</body>
</html>
