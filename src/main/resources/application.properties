spring.application.name=SeWeb_hw2

# Activate 'local' profile to load application-local.properties (which has the API key)
spring.profiles.active=local

# =============================================================================
# Google Gemini API Configuration (for RAG Chatbot)
# =============================================================================
# Get your free API key from: https://aistudio.google.com
# The chatbot uses this key to call the Gemini LLM for generating answers
# grounded in the RDF vector store data.
#
# To run this app, create a file called application-local.properties in
# src/main/resources/ with:
#   gemini.api.key=YOUR_API_KEY_HERE
#   gemini.model=gemini-2.0-flash

gemini.api.key=${GEMINI_API_KEY:no-key-set}
gemini.model=gemini-2.0-flash
